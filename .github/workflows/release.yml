name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apple:
    name: Build Apple release artifact
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim
      - run: ./scripts/check-c-header.sh
      - run: ./scripts/package-apple-xcframework.sh
      - run: ./scripts/package-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: apple-release-artifacts
          path: |
            dist/apple/AegisFFI.xcframework.zip
            dist/checksums/SHA256SUMS

  windows:
    name: Build Windows release artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - shell: pwsh
        run: ./scripts/package-windows-msvc.ps1
      - shell: bash
        run: ./scripts/package-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            dist/windows/aegis-windows-x86_64-msvc.zip
            dist/checksums/SHA256SUMS

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - apple
      - windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Merge checksums
        run: |
          cat release-artifacts/*/SHA256SUMS | sort > SHA256SUMS
      - name: Publish artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            release-artifacts/apple-release-artifacts/AegisFFI.xcframework.zip \
            release-artifacts/windows-release-artifacts/aegis-windows-x86_64-msvc.zip \
            SHA256SUMS \
            --title "$TAG_NAME" \
            --notes "Aegis native release artifacts for Apple Silicon and Windows MSVC."

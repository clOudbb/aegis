name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apple:
    name: Build Apple release artifact
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim
      - run: ./scripts/check-c-header.sh
      - run: ./scripts/package-apple-xcframework.sh
      - run: ./scripts/package-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: apple-release-artifacts
          path: |
            dist/apple/AegisFFI.xcframework.zip
            dist/checksums/SHA256SUMS

  windows:
    name: Build Windows release artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - shell: pwsh
        run: ./scripts/package-windows-msvc.ps1
      - shell: bash
        run: ./scripts/package-checksums.sh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: |
            dist/windows/aegis-windows-x86_64-msvc.zip
            dist/checksums/SHA256SUMS

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - apple
      - windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Merge checksums
        run: |
          find release-artifacts -name SHA256SUMS -type f -print0 \
            | sort -z \
            | xargs -0 cat \
            | sort > SHA256SUMS
      - name: Publish artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          apple_artifact="$(find release-artifacts -name AegisFFI.xcframework.zip -type f -print -quit)"
          windows_artifact="$(find release-artifacts -name aegis-windows-x86_64-msvc.zip -type f -print -quit)"

          if [ -z "$apple_artifact" ]; then
            echo "Missing AegisFFI.xcframework.zip" >&2
            find release-artifacts -type f >&2
            exit 1
          fi
          if [ -z "$windows_artifact" ]; then
            echo "Missing aegis-windows-x86_64-msvc.zip" >&2
            find release-artifacts -type f >&2
            exit 1
          fi

          gh release create "$TAG_NAME" \
            "$apple_artifact" \
            "$windows_artifact" \
            SHA256SUMS \
            --repo "$GH_REPO" \
            --title "$TAG_NAME" \
            --notes "Aegis native release artifacts for Apple Silicon and Windows MSVC."
